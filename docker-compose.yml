version: '3.9'

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: banking
      POSTGRES_PASSWORD: banking
      POSTGRES_DB: banking_simulator
    ports:
      - '5432:5432'
    volumes:
      - banking_db:/var/lib/postgresql/data

volumes:
  banking_db:
